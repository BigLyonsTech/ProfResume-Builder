# ============================================================
#   Nginx Configuration for Resume Builder React App
#   Key role: serve React's index.html for ALL routes so
#   React Router can handle navigation client-side.
#   Without this, refreshing any page returns a 404.
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — makes assets load faster
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static assets with long cache (they're fingerprinted by Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Forward all /api/* requests to the Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all: return index.html for any route
    # This is what makes React Router work on page refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}
