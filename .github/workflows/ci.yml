# ============================================================
#   Resume Builder — GitHub Actions CI/CD Pipeline
#
#   Triggers on every push or pull request to main branch.
#
#   Jobs:
#     1. backend-build  → Compiles Java, runs tests
#     2. frontend-build → Installs deps, builds React
#     3. docker-build   → Builds both Docker images
# ============================================================
name: Resume Builder CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  # ── Job 1: Build & Test Backend ──────────────────────────
  backend-build:
    name: Build Spring Boot Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: .
        run: mvn clean compile -B

      - name: Run Tests
        working-directory: .
        run: mvn test -B

      - name: Package JAR
        working-directory: .
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  # ── Job 2: Build Frontend ────────────────────────────────
  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build React app
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Job 3: Docker Build ──────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]   # Only runs if both builds pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false     # Set to true + add Docker Hub credentials to push
          tags: resume-builder-backend:latest

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false     # Set to true + add Docker Hub credentials to push
          tags: resume-builder-frontend:latest