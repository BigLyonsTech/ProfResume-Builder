# Application name
spring.application.name=resume-builder

# Server port
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:resumedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console - access at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
# Removed spring.jpa.database-platform — Hibernate 6 auto-detects H2, explicit setting causes conflicts
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.resumebuilder=DEBUG
logging.level.org.hibernate.SQL=DEBUG
